services:
  # === Backend Django ===
  backend:
    build: .
    container_name: mea_backend
    volumes:
      - .:/app
      - ./static:/app/MEA/static
    ports:
      - '8000:8000'
    env_file:
      - ./.env

  # === Frontend React + Vite ===
  frontend:
    build: ./inventario-front
    container_name: mea_frontend
    volumes:
      - ./inventario-front:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host
