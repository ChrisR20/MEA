services:
  backend:
    build: .
    container_name: mea_backend

    volumes:
      - .:/app
      - ./staticfiles:/app/staticfiles

    ports:
      - '8000:8000'

    env_file:
      - ./.env

    environment:
      - DJANGO_SETTINGS_MODULE=MEA.production

    extra_hosts:
      - "host.docker.internal:host-gateway"

    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn MEA.wsgi:application --bind 0.0.0.0:8000"

  frontend:
    build: ./inventario-front
    container_name: mea_frontend

    volumes:
      - ./inventario-front:/app
      - /app/node_modules

    ports:
      - '5173:5173'

    environment:
      - CHOKIDAR_USEPOLLING=true

    command: npm run dev -- --host
